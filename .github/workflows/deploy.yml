name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'games/gravelrun/src/**'
      - 'games/snake/src/**'
      - 'games/skyrift/src/**'
      - 'games/void-sentinel/src/**'
      - 'games/chronoforge/src/**'
      - 'games/chronoforge/package.json'
      - 'games/chronoforge/package-lock.json'
      - 'games/chronoforge/vite.config.js'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build chronoforge
        run: |
          cd games/chronoforge
          npm ci
          npm run build

      - name: Build site
        run: |
          mkdir -p _site/gravelrun _site/snake _site/skyrift _site/void-sentinel
          cp -r games/chronoforge/dist/. _site/
          cp -r games/gravelrun/src/. _site/gravelrun/
          cp -r games/snake/src/. _site/snake/
          cp -r games/skyrift/src/. _site/skyrift/
          cp -r games/void-sentinel/src/. _site/void-sentinel/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
