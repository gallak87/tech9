<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID SENTINEL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #02010a;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #wrap {
      position: relative;
      height: 100vh;
      aspect-ratio: 2 / 3;
      max-width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 32px rgba(90, 200, 255, 0.28));
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #02010a;
      width: 100%;
      height: 100%;
      border: 1px solid #0d1b3a;
      box-shadow: 0 0 80px rgba(0, 255, 255, 0.14),
                  inset 0 0 60px rgba(255, 0, 200, 0.07);
    }
    @media (max-aspect-ratio: 2/3) {
      #wrap { height: auto; width: 100vw; }
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="canvas"></canvas>
  </div>
  <script src="game.js"></script>
</body>
</html>
